# golangci-lint configuration (v2 format)
# See: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gosec
    - prealloc

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

    misspell:
      locale: US

    gosec:
      excludes:
        - G104  # Audit errors not checked (we handle this case-by-case)

  exclusions:
    rules:
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - gosec
      - path: pkg/testutils/testutils\.go
        linters:
          - gosec

issues:
  # Maximum issues count per one linter
  max-issues-per-linter: 50

  # Maximum count of issues with the same text
  max-same-issues: 10

formatters:
  enable:
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/irfndi/goflux

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true
